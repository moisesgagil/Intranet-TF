<div class="animate-fade-in-up space-y-6">
  
  <div class="border-b border-slate-100 pb-4 mb-6">
    <h2 class="text-xl font-bold text-slate-800 tracking-tight">Gestión de Usuarios</h2>
    <p class="text-sm text-slate-500">Administra los roles y el acceso a la plataforma.</p>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-600">
        <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
          <tr>
            <th class="px-6 py-4 font-bold rounded-tl-2xl">Usuario</th>
            <th class="px-6 py-4 font-bold">Lirion ID</th>
            <th class="px-6 py-4 font-bold">Estado</th>
            <th class="px-6 py-4 font-bold">Roles</th>
            <th class="px-6 py-4 font-bold rounded-tr-2xl text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let u of usuarios" class="hover:bg-slate-50/50 transition-colors group">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 flex items-center justify-center text-blue-700 font-bold shadow-inner">
                  {{ u.nombre.charAt(0) | uppercase }}
                </div>
                <div>
                  <div class="font-bold text-slate-800">{{ u.nombre }}</div>
                  <div class="text-xs text-slate-500">{{ u.username }}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 font-mono text-slate-500">
              <span class="bg-slate-100 px-2 py-1 rounded text-xs">{{ u.adempiere_user_id || 'N/A' }}</span>
            </td>
            <td class="px-6 py-4">
              <!-- Toggle de Activo -->
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" [ngModel]="u.activo === 1" (ngModelChange)="toggleActivo(u, $event)" [disabled]="u.isSavingActivo" class="sr-only peer">
                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                <span class="ml-2 text-xs font-medium text-slate-500">{{ u.activo === 1 ? 'Activo' : 'Inactivo' }}</span>
              </label>
              <div *ngIf="u.isSavingActivo" class="animate-spin w-3 h-3 border-2 border-slate-300 border-t-emerald-500 rounded-full inline-block ml-2"></div>
            </td>
            <td class="px-6 py-4">
              <div class="flex flex-wrap gap-1">
                <span *ngFor="let rol of u.rol" class="px-2 py-0.5 text-[10px] font-bold rounded uppercase tracking-widest"
                  [ngClass]="{
                    'bg-indigo-50 text-indigo-700 border border-indigo-200': rol === 'system',
                    'bg-orange-50 text-orange-700 border border-orange-200': rol === 'admin',
                    'bg-green-50 text-green-700 border border-green-200': rol === 'operador'
                  }">
                  {{ rol }}
                </span>
              </div>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <!-- Dropdown múltiple improvisado con botones -->
                <div class="flex bg-slate-100 p-1 rounded-lg gap-1 border border-slate-200">
                  <button *ngFor="let r of rolesPermitidos" 
                          (click)="toggleRol(u, r)"
                          [disabled]="u.isSaving"
                          class="px-2 py-1 text-[10px] font-bold rounded transition-colors uppercase tracking-wider"
                          [ngClass]="tieneRol(u, r) ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400 hover:text-slate-600'">
                    {{ r }}
                  </button>
                </div>
                <div *ngIf="u.isSaving" class="animate-spin w-4 h-4 border-2 border-slate-300 border-t-blue-500 rounded-full"></div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div *ngIf="usuarios.length === 0" class="p-8 text-center text-slate-500">
        No hay usuarios registrados en la plataforma.
      </div>
    </div>
  </div>
</div>
