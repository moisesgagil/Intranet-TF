<div class="animate-fade-in-up space-y-6">
  
  <!-- Header -->
  <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Gestión de Usuarios</h1>
      <p class="text-sm text-slate-500 mt-1">Administra los roles y el acceso a la plataforma</p>
    </div>
    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-600">
        <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
          <tr>
            <th class="px-6 py-4 font-bold rounded-tl-2xl">Usuario</th>
            <th class="px-6 py-4 font-bold">Lirion ID</th>
            <th class="px-6 py-4 font-bold">Rol Actual</th>
            <th class="px-6 py-4 font-bold rounded-tr-2xl text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let u of usuarios" class="hover:bg-slate-50/50 transition-colors group">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 flex items-center justify-center text-blue-700 font-bold shadow-inner">
                  {{ u.nombre.charAt(0) | uppercase }}
                </div>
                <div>
                  <div class="font-bold text-slate-800">{{ u.nombre }}</div>
                  <div class="text-xs text-slate-500">{{ u.username }}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 font-mono text-slate-500">
              <span class="bg-slate-100 px-2 py-1 rounded text-xs">{{ u.adempiere_user_id || 'N/A' }}</span>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 text-xs font-bold rounded-full uppercase tracking-widest inline-flex items-center gap-1"
                [ngClass]="{
                  'bg-indigo-50 text-indigo-700': u.rol === 'system',
                  'bg-orange-50 text-orange-700': u.rol === 'admin',
                  'bg-green-50 text-green-700': u.rol === 'operador'
                }">
                {{ u.rol }}
                <svg *ngIf="u.showSuccess" class="w-3 h-3 text-green-500 ml-1 animate-fade-in" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <div class="w-32">
                  <app-select-pro 
                    [options]="[{id: 'operador', name: 'OPERADOR'}, {id: 'admin', name: 'ADMIN'}, {id: 'system', name: 'SYSTEM'}]"
                    [selectedId]="u.rol"
                    (selectionChange)="cambiarRol(u, $event)"
                    [isCompact]="true">
                  </app-select-pro>
                </div>
                <div *ngIf="u.isSaving" class="animate-spin w-4 h-4 border-2 border-slate-300 border-t-blue-500 rounded-full"></div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div *ngIf="usuarios.length === 0" class="p-8 text-center text-slate-500">
        No hay usuarios registrados en la plataforma.
      </div>
    </div>
  </div>
</div>
