<div class="animate-fade-in-up space-y-6">
  
  <!-- Header -->
  <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Configuración del Sistema</h1>
      <p class="text-sm text-slate-500 mt-1">Ajustes globales y conexiones a sistemas externos</p>
    </div>
    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    
    <!-- Preferencias Card -->
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-slate-100 p-6">
      <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-green-500"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" /></svg>
        Preferencias del Sistema
      </h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Permitir cambio de servidor</label>
          <app-select-pro 
            [options]="[{id: 'true', name: 'Sí'}, {id: 'false', name: 'No'}]"
            [selectedId]="configs['allow_server_change']"
            (selectionChange)="configs['allow_server_change'] = $event">
          </app-select-pro>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Servidor por Defecto</label>
          <app-select-pro 
            [options]="[{id: 'test', name: 'Pruebas (Test)'}, {id: 'prod', name: 'Producción (Prod)'}]"
            [selectedId]="configs['default_server']"
            (selectionChange)="configs['default_server'] = $event">
          </app-select-pro>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl animate-fade-in-up font-medium flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
    {{ successMessage }}
  </div>

  <div class="flex justify-end pt-4" *ngIf="!loading">
    <button (click)="guardar()" [disabled]="saving" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-500 hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex items-center gap-2 disabled:opacity-50 disabled:hover:translate-y-0">
      <span *ngIf="saving" class="animate-spin w-4 h-4 border-2 border-white/80 border-t-transparent rounded-full"></span>
      Guardar Cambios
    </button>
  </div>
</div>
