<div class="max-w-7xl mx-auto w-full px-4 xl:px-8">
  <div class="h-full flex flex-col md:flex-row gap-6">
    
    <!-- Sidebar de Configuración -->
    <aside class="w-full md:w-64 shrink-0">
      <div class="mb-6 px-2">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Ajustes</h1>
        <p class="text-sm text-slate-500 mt-1">Configuración global del sistema</p>
      </div>
      
      <nav class="flex flex-col gap-1">
        <a routerLink="/configuracion/servidor" routerLinkActive="bg-white shadow-sm text-blue-700 font-bold border-transparent" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium hover:bg-white/60 transition-all border border-transparent">
          <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3m-19.5 0a4.5 4.5 0 0 1 .9-2.7L5.737 5.1a3.375 3.375 0 0 1 2.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 0 1 .9 2.7m0 0a3 3 0 0 1-3 3m0 3h.008v.008h-.008v-.008Zm0-6h.008v.008h-.008v-.008Zm-3 6h.008v.008h-.008v-.008Zm-3 6h.008v.008h-.008v-.008Z" /></svg>
          </div>
          Servidor
        </a>
        
        <a routerLink="/configuracion/usuarios" routerLinkActive="bg-white shadow-sm text-indigo-700 font-bold border-transparent" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium hover:bg-white/60 transition-all border border-transparent">
          <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg>
          </div>
          Usuarios
        </a>
      </nav>
    </aside>

    <!-- Content Panel -->
    <main class="flex-1 min-h-[500px] overflow-hidden">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
