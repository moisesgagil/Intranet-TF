<div class="w-full relative" [style.z-index]="zIndex">
  <label *ngIf="label && !isCompact" class="block text-sm font-semibold text-slate-700 mb-1">{{ label }}</label>
  
  <!-- Select Trigger Button -->
  <button type="button" (click)="toggleOpen()"
    [ngClass]="isCompact ? 'px-3 py-1.5 bg-slate-50 text-xs rounded-lg border-slate-200 shadow-sm' : 'px-4 py-3 bg-slate-50 text-sm rounded-xl border-slate-200 shadow-sm'"
    class="w-full flex items-center justify-between border font-medium text-slate-800 outline-none cursor-pointer hover:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-left">
    <span class="truncate" [class.text-slate-400]="selectedId === null" [title]="selectedName">{{ selectedName }}</span>
    <svg [ngClass]="isCompact ? 'w-3 h-3' : 'w-4 h-4'" class="text-slate-400 ml-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
  </button>

  <!-- Floating Dropdown Menu -->
  <div *ngIf="isOpen" class="absolute left-0 top-full mt-2 w-full animate-fade-in-up origin-top" style="z-index: 1000;">
    
    <!-- Modal Container -->
    <div class="relative w-full bg-white backdrop-blur-3xl border border-slate-200 rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[50vh]">
      
      <!-- Header / Search -->
      <div class="p-3 border-b border-slate-100 bg-slate-50/50">
        <div class="relative group">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 group-focus-within:text-blue-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </span>
          <input type="text" [(ngModel)]="searchQuery" placeholder="Buscar..." 
            class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-800 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 placeholder-slate-400 transition-all">
        </div>
      </div>

      <!-- Options List -->
      <div class="overflow-y-auto custom-scrollbar flex-1 p-2">
        <div *ngIf="filteredOptions.length === 0" class="p-4 text-center text-slate-500 text-sm">
          No se encontraron resultados
        </div>
        <button type="button" *ngFor="let option of filteredOptions" (click)="selectOption(option.id)" 
          [ngClass]="selectedId === option.id ? 'bg-blue-50 text-blue-600 border-blue-200 shadow-sm' : 'text-slate-600 hover:bg-slate-50 border-transparent hover:text-slate-900'"
          class="w-full text-left px-4 py-3 text-sm font-semibold transition-all rounded-xl border flex items-center justify-between mb-1 group">
          <span class="truncate" [title]="option.name">{{ option.name }}</span>
          <svg *ngIf="selectedId === option.id" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </button>
      </div>
      
    </div>
  </div>
</div>
