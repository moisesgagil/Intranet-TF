<div
  class="min-h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-slate-200 flex flex-col items-center justify-center p-4 relative overflow-x-hidden overflow-y-auto custom-scrollbar">
  <!-- Fondo decorativo sutil -->
  <div
    class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80')] bg-cover bg-center opacity-10 pointer-events-none">
  </div>

  <div class="w-full max-w-md relative z-10 animate-fade-in-up">
    <div
      class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 transition-all duration-300 hover:shadow-[0_8px_40px_rgb(0,0,0,0.1)]">
      <!-- Barra superior con gradiente animado -->
      <div class="h-2 bg-gradient-to-r from-blue-600 via-blue-500 to-indigo-600 animate-gradient-x rounded-t-2xl"></div>

      <div class="p-8">
        <!-- Logo y título -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-36 h-28 mb-2">
            <img src="assets/logoTF_sinfondo.png" alt="Techfoods Logo" class="w-full h-full object-contain filter drop-shadow-md" />
          </div>
          <h1 class="text-3xl font-bold text-slate-800 tracking-tight mt-2">Techfoods</h1>
          <p class="text-slate-500 mt-2 text-sm uppercase tracking-widest font-black">Control de Insumos</p>
        </div>

        <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
          <ng-container *ngIf="step === 1">
            <div class="animate-fade-in-up space-y-6 w-full">
              <!-- Campo usuario -->
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Usuario de Lirion</label>
                <div class="relative group">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                      xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                  </span>
                  <input type="text" name="username" [(ngModel)]="loginData.username" required
                    class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200"
                    placeholder="Ingresa tu usuario">
                </div>
              </div>

              <!-- Campo contraseña -->
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                <div class="relative group">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                      xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6-4h12a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6a2 2 0 012-2zm10-4V8a4 4 0 00-8 0v3h8z">
                      </path>
                    </svg>
                  </span>
                  <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginData.password"
                    required
                    class="w-full pl-10 pr-12 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200"
                    placeholder="••••••••">
                  <button type="button" (click)="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none">
                    <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                      xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                      </path>
                    </svg>
                    <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                      xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                      </path>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="flex items-center justify-between -mt-2">
                <label class="flex items-center cursor-pointer group">
                  <div class="relative flex items-center">
                    <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" class="peer sr-only">
                    <div
                      class="w-11 h-6 bg-slate-200 rounded-full transition-colors duration-300 ease-out peer-checked:bg-gradient-to-r peer-checked:from-blue-600 peer-checked:to-indigo-500 peer-focus:ring-2 peer-focus:ring-blue-500/50 shadow-inner">
                    </div>
                    <div
                      class="absolute left-0.5 bg-white w-5 h-5 rounded-full transition-transform duration-300 ease-out peer-checked:translate-x-5 shadow-sm flex items-center justify-center">
                      <svg class="w-3 h-3 text-blue-600 transition-opacity duration-300 ease-out"
                        [class.opacity-100]="rememberMe" [class.opacity-0]="!rememberMe" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path>
                      </svg>
                    </div>
                  </div>
                  <span
                    class="ml-3 text-sm font-medium text-slate-600 group-hover:text-slate-900 transition-colors duration-200 select-none">
                    Recordar usuario
                  </span>
                </label>
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="step === 3">
            <div class="animate-fade-in-up space-y-4 w-full relative" style="z-index: 100;">
              <h3 class="text-center font-bold text-slate-700 text-lg mb-4">Selecciona tu Rol de PMS</h3>
              <p class="text-center text-sm text-slate-500 mb-6">Tu cuenta tiene múltiples roles asignados. Por favor selecciona con cuál deseas iniciar esta sesión.</p>
              
              <div class="space-y-3">
                <button *ngFor="let rol of availablePmsRoles" 
                        type="button" 
                        (click)="seleccionarRolPms(rol)"
                        class="w-full py-4 px-6 bg-white border-2 border-blue-100 hover:border-blue-500 hover:bg-blue-50 rounded-xl text-blue-700 font-bold uppercase tracking-widest text-sm shadow-sm transition-all flex justify-between items-center group">
                  <span>{{ rol }}</span>
                  <svg class="w-5 h-5 text-blue-300 group-hover:text-blue-500 transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
              </div>

              <div class="flex justify-center mt-6 pt-4 border-t border-slate-100 relative" style="z-index: 40;">
                <button type="button" (click)="step = 2" class="text-sm text-blue-600 hover:text-blue-500 font-semibold transition-colors">
                  ← Volver a opciones de Lirion
                </button>
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="step === 2">
            <div class="animate-fade-in-up space-y-4 w-full relative" style="z-index: 100;">
              <!-- Selector de Cliente -->
              <div class="relative" style="z-index: 90;">
                <app-select-pro 
                  label="Cliente" 
                  placeholder="Seleccione un cliente" 
                  [options]="clients" 
                  [selectedId]="loginData.clientId"
                  [zIndex]="100"
                  (selectionChange)="seleccionarCliente($event)">
                </app-select-pro>
              </div>

              <!-- Role ID -->
              <div *ngIf="roles.length > 0" class="animate-fade-in-up relative" style="animation-delay: 100ms; z-index: 80;">
                <app-select-pro 
                  label="Rol" 
                  placeholder="Seleccione un rol" 
                  [options]="roles" 
                  [selectedId]="loginData.roleId"
                  [zIndex]="90"
                  (selectionChange)="seleccionarRol($event)">
                </app-select-pro>
              </div>

              <!-- Org ID -->
              <div *ngIf="organizations.length > 0" class="animate-fade-in-up relative" style="animation-delay: 150ms; z-index: 70;">
                <app-select-pro 
                  label="Organización" 
                  placeholder="Seleccione una organización" 
                  [options]="organizations" 
                  [selectedId]="loginData.organizationId"
                  [zIndex]="80"
                  (selectionChange)="seleccionarOrg($event)">
                </app-select-pro>
              </div>

              <!-- Warehouse ID -->
              <div *ngIf="warehouses.length > 0" class="animate-fade-in-up relative" style="animation-delay: 200ms; z-index: 60;">
                <app-select-pro 
                  label="Almacén" 
                  placeholder="Seleccione un almacén" 
                  [options]="warehouses" 
                  [selectedId]="loginData.warehouseId"
                  [zIndex]="70"
                  (selectionChange)="seleccionarAlmacen($event)">
                </app-select-pro>
              </div>

              <!-- Switch Recordar Preferencias (Light Mode version) -->
              <div class="flex items-center mt-4 relative" style="z-index: 50;">
                <label class="flex items-center cursor-pointer group">
                  <div class="relative flex items-center">
                    <input type="checkbox" name="rememberPreferences" [(ngModel)]="rememberPreferences" class="peer sr-only">
                    <div
                      class="w-11 h-6 bg-slate-200 rounded-full transition-colors duration-300 ease-out peer-checked:bg-gradient-to-r peer-checked:from-blue-600 peer-checked:to-indigo-500 peer-focus:ring-2 peer-focus:ring-blue-500/50 shadow-inner">
                    </div>
                    <div
                      class="absolute left-0.5 bg-white w-5 h-5 rounded-full transition-transform duration-300 ease-out peer-checked:translate-x-5 shadow-sm flex items-center justify-center">
                      <svg class="w-3 h-3 text-blue-600 transition-opacity duration-300 ease-out"
                        [class.opacity-100]="rememberPreferences" [class.opacity-0]="!rememberPreferences" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path>
                      </svg>
                    </div>
                  </div>
                  <span class="ml-3 text-sm font-medium text-slate-600 group-hover:text-slate-900 transition-colors duration-200 select-none">
                    Recordar estas preferencias
                  </span>
                </label>
              </div>
              <div class="flex justify-start mt-2 relative" style="z-index: 40;">
                <button type="button" (click)="step = 1" class="text-sm text-blue-600 hover:text-blue-500 font-semibold transition-colors">
                  ← Volver al usuario
                </button>
              </div>
            </div>
          </ng-container>

          <p *ngIf="errorMessage"
            class="text-red-500 text-sm font-medium text-center bg-red-50 p-3 rounded-xl border border-red-200 animate-shake">
            {{ errorMessage }}
          </p>

          <!-- Botón submit -->
          <div *ngIf="step !== 3" class="relative" style="z-index: 30;">
            <button type="submit" [disabled]="loading"
              class="relative w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 rounded-xl hover:from-blue-500 hover:to-indigo-500 active:scale-[0.98] transition-all duration-200 shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.23)] disabled:from-slate-300 disabled:to-slate-300 disabled:shadow-none disabled:text-slate-500 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span *ngIf="loading"
              class="animate-spin inline-block w-5 h-5 border-2 border-white/80 border-t-transparent rounded-full"></span>
            {{ loading ? 'Procesando...' : (step === 1 ? 'Continuar' : 'Iniciar Sesión') }}
            </button>
          </div>


        </form>

        <div
          class="mt-6 pt-6 border-t border-slate-100 text-center text-xs text-slate-400 uppercase tracking-[0.2em] font-mono">
          CONSULTOR DE SOLICITUDES
        </div>
      </div>
    </div>
  </div>
</div>
